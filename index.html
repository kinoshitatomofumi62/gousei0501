<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPルーレット</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ルーレット本体の回転アニメーション用クラス */
    .roulette-spin {
      transition: transform 5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    /* モーダルや結果表示のフェードアニメーション用 */
    .fade-overlay {
      transition: opacity 0.3s ease, backdrop-filter 0.3s ease;
    }
    .fade-content {
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* 弾むようなポップアップ */
    }
    .hidden-state-overlay { opacity: 0; pointer-events: none; }
    .hidden-state-content { opacity: 0; transform: scale(0.85); pointer-events: none; }
    
    /* スクロールバーのカスタマイズ（設定画面のリスト用） */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col items-center justify-center relative overflow-hidden bg-cover bg-center bg-no-repeat" style="background-image: url('https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aaaa.png');">
  
  <!-- 背景を少し暗く落とすオーバーレイ（ぼかしなし） -->
  <div class="absolute inset-0 bg-black/20 z-0 pointer-events-none"></div>

  <!-- ヘッダー＆設定ボタンエリア -->
  <header class="absolute top-4 left-4 md:top-6 md:left-6 z-10 pointer-events-auto">
    <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-white flex items-center gap-2 drop-shadow-lg">
      🎯 KPルーレット
    </h1>
  </header>
  <button id="openSettingsBtn" class="absolute top-4 right-4 md:top-6 md:right-6 p-3 bg-white/10 backdrop-blur-md rounded-full text-white hover:bg-white/20 border border-white/20 shadow-lg transition-all hover:scale-105 active:scale-95 z-10 pointer-events-auto">
    <!-- Settings Icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
  </button>

  <!-- メインルーレットエリア -->
  <div class="w-full max-w-md flex flex-col items-center justify-center z-10 mt-12 md:mt-0 flex-1 relative pointer-events-auto">
    <div class="relative w-full aspect-square drop-shadow-2xl my-4 flex items-center justify-center">
      <!-- 針（ポインター） -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-6 z-20 transition-transform">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor" class="text-white drop-shadow-xl filter">
          <path d="M12 24L0 0h24z" />
        </svg>
      </div>

      <!-- ルーレット本体 -->
      <div id="rouletteContainer" class="w-full h-full absolute inset-0 roulette-spin" style="transform: rotate(0deg);">
        <svg id="rouletteSvg" viewBox="0 0 100 100" class="w-full h-full rounded-full overflow-hidden shrink-0 border-4 border-white/40 bg-black/20 shadow-2xl backdrop-blur-sm">
          <!-- 盤面要素はJavaScriptで描画 -->
        </svg>
      </div>

      <!-- 中心軸とスタートボタン -->
      <div class="relative w-24 h-24 bg-white/20 backdrop-blur-md rounded-full flex flex-col items-center justify-center shadow-2xl border-4 border-white/30 z-30">
        <button id="spinBtn" class="w-full h-full rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all outline-none focus:ring-4 focus:ring-white/50">
          <!-- Play Icon -->
          <svg class="w-10 h-10 ml-2 fill-white text-white drop-shadow-md" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>
      </div>

      <!-- 結果表示オーバーレイ -->
      <div id="resultModalOverlay" class="absolute inset-0 z-40 flex items-center justify-center fade-overlay hidden-state-overlay bg-black/40 backdrop-blur-[4px] rounded-full">
        <!-- Card -->
        <div id="resultModalContent" class="relative p-6 bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl w-[85%] text-center shadow-2xl flex flex-col items-center fade-content hidden-state-content">
          <div class="text-white/80 text-xs font-bold uppercase tracking-wider mb-2 flex items-center justify-center gap-1.5 drop-shadow-sm">
            <!-- Trophy Icon -->
            <svg class="w-4 h-4 text-amber-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
            Winner
          </div>
          <div id="resultName" class="text-4xl font-extrabold text-white drop-shadow-lg mb-3 line-clamp-2"></div>
          <div id="resultChance" class="text-white/90 text-xs font-bold mb-5 bg-black/30 px-3 py-1.5 rounded-full border border-white/10 shadow-inner"></div>

          <div class="w-full flex gap-2">
            <button id="closeResultBtn" class="flex-1 h-11 rounded-xl bg-white/10 border border-white/20 text-white font-bold flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all text-xs shadow-md backdrop-blur-sm">
              閉じる
            </button>
            <button id="spinAgainBtn" class="flex-[2] h-11 rounded-xl bg-white text-slate-900 font-bold flex items-center justify-center gap-1.5 hover:bg-slate-200 active:scale-95 transition-all shadow-xl text-xs">
               <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
               連続スタート
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 設定モーダル全体 -->
  <div id="settingsArea" class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 pointer-events-none">
    <!-- バックドロップ -->
    <div id="settingsBackdrop" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm fade-overlay hidden-state-overlay pointer-events-auto"></div>
    
    <!-- モーダルコンテンツ -->
    <div id="settingsModal" class="relative bg-slate-50 rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden z-10 fade-content hidden-state-content pointer-events-auto text-slate-900">
      
      <!-- ヘッダー -->
      <div class="flex items-center justify-between p-4 sm:p-6 border-b border-slate-200 bg-white shadow-sm z-10">
        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
          <!-- Settings2 Icon -->
          <svg class="w-5 h-5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7h-9"></path><path d="M14 17H5"></path><circle cx="17" cy="17" r="3"></circle><circle cx="7" cy="7" r="3"></circle></svg>
          設定・選択肢の管理
        </h2>
        <button id="closeSettingsBtn" class="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors">
          <!-- X Icon -->
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <!-- メインボディ -->
      <div class="overflow-y-auto p-4 sm:p-6 space-y-6 flex-1">
        
        <!-- 減衰モード トグルスイッチ -->
        <div id="decayToggleBtn" class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-start justify-between cursor-pointer group hover:border-slate-300 transition-all select-none">
          <div class="pr-4">
            <h3 class="text-sm font-bold text-slate-800 flex items-center gap-2">減衰（ドロップアウト）モード</h3>
            <p class="text-xs text-slate-500 mt-2 font-medium leading-relaxed">
              ONにすると、当選した選択肢の割合（重み）が 自動的に「1」減ります。<br/>
              0になった選択肢は消去され、残りの確率が再計算されます。
            </p>
          </div>
          <div id="decayToggleBg" class="mt-1 relative inline-flex h-6 w-11 shrink-0 items-center rounded-full transition-colors bg-slate-300">
             <span id="decayToggleKnob" class="inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform translate-x-1"></span>
          </div>
        </div>

        <!-- 選択肢と割合の管理リスト -->
        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
          <div class="flex text-[11px] font-bold text-slate-400 px-2 pb-2 border-b border-slate-100 mb-3 tracking-wider uppercase">
            <div class="flex-1">アイテム名</div>
            <div class="w-16 text-center">重み</div>
            <div class="w-16 text-center">確率</div>
            <div class="w-8"></div>
          </div>
          
          <div id="itemListContainer" class="space-y-2 max-h-[40vh] overflow-y-auto pr-1">
             <!-- アイテムリストはJSで描画 -->
          </div>

          <!-- 追加フォーム -->
          <form id="addItemForm" class="mt-4 pt-4 border-t border-slate-100 flex gap-2">
            <input id="newItemName" type="text" placeholder="項目名" required class="flex-1 border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 disabled:bg-slate-50 w-full" />
            <input id="newItemWeight" type="number" min="1" value="10" required class="w-16 border border-slate-200 rounded-xl px-1 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-slate-400 disabled:bg-slate-50" />
            <button type="submit" class="px-3 py-2 bg-slate-800 text-white rounded-xl text-sm font-bold flex items-center gap-1 hover:bg-slate-700 disabled:opacity-50 transition-colors shrink-0">
               <!-- Plus Icon -->
               <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> 
               追加
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ==============================
       定数・初期状態・ユーティリティ
       ============================== */
    const COLORS = [
      '#EF4444', '#3B82F6', '#10B981', '#F59E0B',
      '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16',
      '#F97316', '#6366F1'
    ];
    
    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

    let items = [
      { id: generateId(), name: 'A', weight: 10, color: COLORS[0] },
      { id: generateId(), name: 'B', weight: 10, color: COLORS[1] },
      { id: generateId(), name: 'C', weight: 10, color: COLORS[2] },
      { id: generateId(), name: 'D', weight: 10, color: COLORS[3] },
    ];

    let decayMode = false;
    let isSpinning = false;
    let rotation = 0;
    
    // SVG描画用の三角関数ヘルパー
    const polarToCartesian = (cx, cy, r, angleInDegrees) => {
      const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
      return {
        x: cx + r * Math.cos(angleInRadians),
        y: cy + r * Math.sin(angleInRadians)
      };
    };

    const createPiePath = (startAngle, endAngle) => {
      if (endAngle - startAngle >= 359.9) {
        return "M 50, 50 m -50, 0 a 50,50 0 1,0 100,0 a 50,50 0 1,0 -100,0";
      }
      const start = polarToCartesian(50, 50, 50, endAngle);
      const end = polarToCartesian(50, 50, 50, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return `M 50 50 L ${start.x} ${start.y} A 50 50 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
    };

    /* ==============================
       DOM要素の取得
       ============================== */
    const rouletteContainer = document.getElementById('rouletteContainer');
    const rouletteSvg = document.getElementById('rouletteSvg');
    const spinBtn = document.getElementById('spinBtn');
    
    // Result Modal
    const resultModalOverlay = document.getElementById('resultModalOverlay');
    const resultModalContent = document.getElementById('resultModalContent');
    const resultName = document.getElementById('resultName');
    const resultChance = document.getElementById('resultChance');
    const closeResultBtn = document.getElementById('closeResultBtn');
    const spinAgainBtn = document.getElementById('spinAgainBtn');
    
    // Settings Modal
    const settingsArea = document.getElementById('settingsArea');
    const settingsBackdrop = document.getElementById('settingsBackdrop');
    const settingsModal = document.getElementById('settingsModal');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    
    // Settings Contents
    const decayToggleBtn = document.getElementById('decayToggleBtn');
    const decayToggleBg = document.getElementById('decayToggleBg');
    const decayToggleKnob = document.getElementById('decayToggleKnob');
    const itemListContainer = document.getElementById('itemListContainer');
    const addItemForm = document.getElementById('addItemForm');
    const newItemName = document.getElementById('newItemName');
    const newItemWeight = document.getElementById('newItemWeight');

    /* ==============================
       状態更新とレンダリング関数
       ============================== */
    const getTotalWeight = () => items.reduce((sum, item) => sum + item.weight, 0);

    const renderRoulette = () => {
      const totalWeight = getTotalWeight();
      rouletteSvg.innerHTML = ''; // クリア

      if (totalWeight <= 0) {
        rouletteSvg.innerHTML = `
          <foreignObject x="0" y="0" width="100" height="100">
            <div xmlns="http://www.w3.org/1999/xhtml" class="w-full h-full flex items-center justify-center text-white/50 font-bold text-center" style="font-size: 10px;">
              選択肢なし
            </div>
          </foreignObject>`;
        spinBtn.style.opacity = '0.3';
        return;
      }
      
      spinBtn.style.opacity = '1';
      let currentAngle = 0;

      items.forEach((item) => {
        const sliceAngle = (item.weight / totalWeight) * 360;
        const startAngle = currentAngle;
        const endAngle = currentAngle + sliceAngle;
        currentAngle = endAngle;

        const angle = endAngle - startAngle;
        const midAngle = startAngle + angle / 2;
        const shouldDrawText = angle > 3;

        // 【仕様 3】文字数に対する文字サイズの動的計算
        const textRadius = 30;
        const textPos = polarToCartesian(50, 50, textRadius, midAngle);
        const textTransform = `rotate(${midAngle + 90}, ${textPos.x}, ${textPos.y})`;

        const arcLength = (angle / 180) * Math.PI * textRadius;
        const textLen = Math.max(1, item.name.length);
        const calculatedFontSize = arcLength / textLen;
        const maxFontSize = Math.min(10, 24 / textLen);
        const fontSize = Math.max(1.5, Math.min(calculatedFontSize, maxFontSize));

        // SVGの組み立て
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', createPiePath(startAngle, endAngle));
        path.setAttribute('fill', item.color);
        path.setAttribute('stroke', '#ffffff');
        path.setAttribute('stroke-width', '0.5');
        g.appendChild(path);

        if (shouldDrawText) {
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', textPos.x);
          text.setAttribute('y', textPos.y);
          text.setAttribute('fill', '#ffffff');
          text.setAttribute('font-size', fontSize.toFixed(2));
          text.setAttribute('font-weight', '800');
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('alignment-baseline', 'middle');
          text.setAttribute('transform', textTransform);
          text.setAttribute('class', 'pointer-events-none drop-shadow-lg filter font-black');
          text.style.textShadow = "1px 1px 2px rgba(0,0,0,0.8)";
          text.textContent = item.name;
          g.appendChild(text);
        }
        rouletteSvg.appendChild(g);
      });
    };

    const renderSettingsList = () => {
      const totalWeight = getTotalWeight();
      itemListContainer.innerHTML = '';

      if (items.length === 0) {
        itemListContainer.innerHTML = `
          <div class="text-center py-6 text-slate-400 flex flex-col items-center gap-2 bg-slate-50 rounded-xl border border-dashed border-slate-200">
            <svg class="w-6 h-6 opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span class="font-medium text-xs">選択肢がありません</span>
          </div>`;
        return;
      }

      items.forEach(item => {
        const prob = totalWeight > 0 ? ((item.weight / totalWeight) * 100).toFixed(1) : 0;
        
        const row = document.createElement('div');
        row.className = 'flex gap-2 items-center group bg-slate-50 p-2 rounded-xl border border-transparent hover:border-slate-200 transition-colors';
        row.innerHTML = `
          <div class="w-3 h-3 rounded-full shrink-0 shadow-sm" style="background-color: ${item.color}"></div>
          <div class="flex-1 font-bold text-slate-700 truncate text-sm">${item.name}</div>
          <div class="w-16">
            <input type="number" min="0" value="${item.weight}" data-id="${item.id}" class="weight-input w-full bg-white border border-slate-200 rounded-lg px-1 py-1 text-center font-mono text-xs focus:outline-none focus:ring-2 focus:ring-slate-400" ${isSpinning ? 'disabled' : ''} />
          </div>
          <div class="w-16 text-center font-mono text-xs font-medium text-slate-500">${prob}%</div>
          <button data-id="${item.id}" class="remove-btn w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors shrink-0" ${isSpinning ? 'disabled' : ''}>
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
          </button>
        `;
        itemListContainer.appendChild(row);
      });

      // イベントリスナーの再付与
      document.querySelectorAll('.weight-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const id = e.target.getAttribute('data-id');
          const val = parseInt(e.target.value, 10) || 0;
          items = items.map(i => i.id === id ? { ...i, weight: val } : i);
          renderApp();
        });
      });

      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.currentTarget.getAttribute('data-id');
          items = items.filter(i => i.id !== id);
          renderApp();
        });
      });
    };

    const toggleDecayUI = () => {
      if (decayMode) {
        decayToggleBg.className = "mt-1 relative inline-flex h-6 w-11 items-center rounded-full transition-colors bg-emerald-500";
        decayToggleKnob.className = "inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform translate-x-6";
      } else {
        decayToggleBg.className = "mt-1 relative inline-flex h-6 w-11 items-center rounded-full transition-colors bg-slate-300";
        decayToggleKnob.className = "inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform translate-x-1";
      }
    };

    // UIの描画更新
    const renderApp = () => {
      renderRoulette();
      renderSettingsList();
      toggleDecayUI();
    };

    /* ==============================
       アニメーション・機能ロジック
       ============================== */
    const hideResultModal = () => {
      resultModalOverlay.classList.add('hidden-state-overlay');
      resultModalContent.classList.add('hidden-state-content');
    };

    const showResultModal = (winner, probability) => {
      resultName.textContent = winner.name;
      resultName.style.textShadow = `0 0 15px ${winner.color}, 0 0 30px ${winner.color}`;
      resultChance.textContent = `当選確率: ${probability.toFixed(1)}%`;
      
      resultModalOverlay.classList.remove('hidden-state-overlay');
      resultModalContent.classList.remove('hidden-state-content');
    };

    const setSettingsModalOpen = (open) => {
      if (open) {
        settingsArea.classList.remove('pointer-events-none');
        settingsBackdrop.classList.remove('hidden-state-overlay');
        settingsModal.classList.remove('hidden-state-content');
      } else {
        settingsArea.classList.add('pointer-events-none');
        settingsBackdrop.classList.add('hidden-state-overlay');
        settingsModal.classList.add('hidden-state-content');
      }
    };

    const executeSpin = () => {
      if (isSpinning || getTotalWeight() <= 0) return;
      
      isSpinning = true;
      hideResultModal();
      setSettingsModalOpen(false); // 安全のため設定画面は閉じる
      
      const totalW = getTotalWeight();
      const randomValue = Math.random() * totalW;

      let accumulated = 0;
      let winningItem = items[0];
      let winStart = 0;
      let winEnd = 0;
      let probability = 0;

      for (const item of items) {
        if (randomValue >= accumulated && randomValue < accumulated + item.weight) {
          winningItem = item;
          probability = (item.weight / totalW) * 100;
          winStart = (accumulated / totalW) * 360;
          winEnd = ((accumulated + item.weight) / totalW) * 360;
          break;
        }
        accumulated += item.weight;
      }

      // エッジを避けて少し内側を狙う
      const padding = (winEnd - winStart) * 0.05;
      const hitAngle = winStart + padding + Math.random() * ((winEnd - winStart) - 2 * padding);

      // 上部（360度 or 0度）の位置に持ってくるための回転角
      const baseRotation = 360 - hitAngle;
      const currentSpins = Math.floor(rotation / 360);
      const numSpins = 5 + Math.floor(Math.random() * 3); // 5〜7回転
      const nextRotation = (currentSpins + numSpins) * 360 + baseRotation;

      rotation = nextRotation;
      rouletteContainer.style.transform = `rotate(${rotation}deg)`;

      // CSSのtransition durationに合わせて5秒後に結果処理
      setTimeout(() => {
        isSpinning = false;
        showResultModal(winningItem, probability);

        // 【仕様 2】減衰モード適用
        if (decayMode) {
          items = items.map(i => {
            if (i.id === winningItem.id) {
              return { ...i, weight: Math.max(0, i.weight - 1) };
            }
            return i;
          }).filter(i => i.weight > 0);
          
          // 裏で確率や盤面を再レンダリング
          renderApp();
        }
      }, 5000);
    };

    /* ==============================
       イベントリスナー設定
       ============================== */
    spinBtn.addEventListener('click', executeSpin);
    spinAgainBtn.addEventListener('click', executeSpin);
    closeResultBtn.addEventListener('click', hideResultModal);
    
    openSettingsBtn.addEventListener('click', () => {
      if (!isSpinning) setSettingsModalOpen(true);
    });
    closeSettingsBtn.addEventListener('click', () => setSettingsModalOpen(false));
    settingsBackdrop.addEventListener('click', () => setSettingsModalOpen(false));

    decayToggleBtn.addEventListener('click', () => {
      if (isSpinning) return;
      decayMode = !decayMode;
      toggleDecayUI();
    });

    addItemForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (isSpinning) return;
      
      const name = newItemName.value.trim();
      const weight = parseInt(newItemWeight.value, 10);
      
      if (!name || isNaN(weight) || weight <= 0) return;

      const nextColor = COLORS[items.length % COLORS.length];
      items.push({ id: generateId(), name, weight, color: nextColor });
      
      newItemName.value = '';
      newItemWeight.value = '10';
      renderApp();
      
      // リストの一番下へスクロール
      setTimeout(() => {
        itemListContainer.scrollTop = itemListContainer.scrollHeight;
      }, 50);
    });

    // 初期描画
    renderApp();

    // 背景画像などの読み込みを待ってルーレットの初期位置（CSSのリセット）を反映
    requestAnimationFrame(() => {
      rouletteContainer.style.transform = `rotate(0deg)`;
    });

  </script>
</body>
</html>
