<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Trig Synth Warrior</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <!-- Image Preloads (画像のチラつきと遅延を防止) -->
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae0.png">
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae1.png">
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae2.png">
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae3.png">
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae4.png">
  <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae5.png">

  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      chtml: { fontURL: 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/output/chtml/fonts/woff-v2' },
      startup: { typeset: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Press Start 2P', cursive;
      background-color: #050505; color: #e0e0e0;
      overflow: hidden; touch-action: manipulation; user-select: none; -webkit-user-select: none;
    }
    .scanlines::before {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.263.1?deps=react@18.2.0"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback, memo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Heart, RefreshCw, Frown, Clock, Plus, Minus, Play, Trophy, Star, Delete, CornerDownLeft } from 'lucide-react';

    const GamePhase = { START: 'START', PLAYING: 'PLAYING', VICTORY: 'VICTORY', GAME_OVER: 'GAME_OVER' };

    const ASSETS = {
      NORMAL: "https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae0.png",
      ATTACK: "https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae2.png", 
      HIT: "https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae1.png",    
      DEFEAT: "https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae3.png", 
      WIN_MISS: "https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae4.png", 
      WIN_PERFECT: "https://cdn.jsdelivr.net/gh/kinoshitatomofumi62/my-assets@main/aae5.png",
    };

    const BASE_TEMPLATES = [
      { a: 1, aLatex: "", b: 1, bLatex: "", rBase: Math.SQRT2, alphaLabel: "\\frac{\\pi}{4}", alphaSign: 1 },
      { a: 1, aLatex: "", b: -1, bLatex: "-", rBase: Math.SQRT2, alphaLabel: "\\frac{\\pi}{4}", alphaSign: -1 },
      { a: -1, aLatex: "-", b: 1, bLatex: "", rBase: Math.SQRT2, alphaLabel: "\\frac{3\\pi}{4}", alphaSign: 1 },
      { a: -1, aLatex: "-", b: -1, bLatex: "-", rBase: Math.SQRT2, alphaLabel: "\\frac{3\\pi}{4}", alphaSign: -1 },
      { a: Math.sqrt(3), aLatex: "\\sqrt{3}", b: 1, bLatex: "", rBase: 2, alphaLabel: "\\frac{\\pi}{6}", alphaSign: 1 },
      { a: 1, aLatex: "", b: Math.sqrt(3), bLatex: "\\sqrt{3}", rBase: 2, alphaLabel: "\\frac{\\pi}{3}", alphaSign: 1 },
      { a: Math.sqrt(3), aLatex: "\\sqrt{3}", b: -1, bLatex: "-", rBase: 2, alphaLabel: "\\frac{\\pi}{6}", alphaSign: -1 },
      { a: 1, aLatex: "", b: -Math.sqrt(3), bLatex: "-\\sqrt{3}", rBase: 2, alphaLabel: "\\frac{\\pi}{3}", alphaSign: -1 },
      { a: -Math.sqrt(3), aLatex: "-\\sqrt{3}", b: 1, bLatex: "", rBase: 2, alphaLabel: "\\frac{5\\pi}{6}", alphaSign: 1 },
      { a: -1, aLatex: "-", b: Math.sqrt(3), bLatex: "\\sqrt{3}", rBase: 2, alphaLabel: "\\frac{2\\pi}{3}", alphaSign: 1 },
      { a: -Math.sqrt(3), aLatex: "-\\sqrt{3}", b: -1, bLatex: "-", rBase: 2, alphaLabel: "\\frac{5\\pi}{6}", alphaSign: -1 },
      { a: -1, aLatex: "-", b: -Math.sqrt(3), bLatex: "-\\sqrt{3}", rBase: 2, alphaLabel: "\\frac{2\\pi}{3}", alphaSign: -1 },
    ];

    const ALPHA_CHOICES = [
      { label: "\\frac{\\pi}{6}" }, { label: "\\frac{\\pi}{4}" }, { label: "\\frac{\\pi}{3}" },
      { label: "\\frac{2\\pi}{3}" }, { label: "\\frac{3\\pi}{4}" }, { label: "\\frac{5\\pi}{6}" },
    ];

    const generateProblem = () => {
      const template = BASE_TEMPLATES[Math.floor(Math.random() * BASE_TEMPLATES.length)];
      const scale = Math.floor(Math.random() * 3) + 1;

      const formatTerm = (baseLatex, isFirst, val) => {
          let s = "";
          const isNeg = val < 0;
          if (isFirst) { if (isNeg) s += "-"; } else { s += isNeg ? " - " : " + "; }
          if (["", "-", "-\\sqrt{3}", "\\sqrt{3}"].includes(baseLatex)) {
              if (baseLatex.includes("sqrt")) { if (scale > 1) s += scale; s += "\\sqrt{3}"; }
              else { if (scale > 1) s += scale; }
          }
          return s;
      };

      let latexA = formatTerm(template.aLatex, true, template.a);
      let latexB = formatTerm(template.bLatex, false, template.b);
      let problemLatex = `${latexA}\\sin\\theta${latexB}\\cos\\theta`;
      
      let correctR = Math.abs(template.rBase - 2) < 0.01 ? (2 * scale).toString() : (scale === 1 ? "" : scale.toString()) + "\\sqrt{2}";
      const correctAlpha = (template.alphaSign === 1 ? "+" : "-") + template.alphaLabel;

      return { id: Math.random().toString(36).substring(7), latex: problemLatex, correctR, correctAlpha };
    };

    const evaluateInput = (inputR, inputOperator, inputAlpha, problem) => {
      let r = inputR.replace(/\s/g, ''); 
      if (r.startsWith("1\\sqrt")) r = r.substring(1);
      if (!inputAlpha) return false;
      return r === problem.correctR && (inputOperator + inputAlpha) === problem.correctAlpha;
    };

    const MathLabel = memo(({ latex, className, displayMode = false }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        if (containerRef.current && window.MathJax) {
          containerRef.current.innerHTML = displayMode ? `\\[${latex}\\]` : `\\(${latex}\\)`;
          window.MathJax.typesetPromise([containerRef.current]).catch(err => console.error(err));
        }
      }, [latex, displayMode]);
      return <div ref={containerRef} className={className} />;
    });

    const MonsterDisplay = memo(({ state, className }) => {
      let src = ASSETS.NORMAL;
      let animClass = "animate-[float_3s_ease-in-out_infinite]";
      
      if (state === 'hit') { src = ASSETS.HIT; animClass = "animate-[shake_0.5s] brightness-150"; }
      else if (state === 'attack') { src = ASSETS.ATTACK; animClass = "animate-[lunge_0.3s_ease-in-out]"; }
      else if (state === 'dead') { animClass = "opacity-50 grayscale"; }

      return (
        <div className={`relative flex justify-center items-center ${className || ''}`}>
          <img src={src} alt="Monster" className={`w-full h-full object-contain drop-shadow-[0_0_15px_rgba(0,188,212,0.4)] transition-all duration-200 ${animClass}`} />
          <style>{`
            @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
            @keyframes lunge { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2) translateY(20px); } }
            @keyframes shake { 0%, 30%, 60%, 90% { transform: translate(2px, 1px) rotate(1deg); } 10%, 40%, 70%, 100% { transform: translate(-2px, -1px) rotate(-1deg); } }
          `}</style>
        </div>
      );
    });

    const Keypad = ({ mode, onPress, onDelete, onSubmit }) => {
      const btnClass = "bg-gray-800 border-2 border-cyan-700 text-cyan-400 font-bold p-0.5 active:bg-cyan-900 active:border-cyan-400 rounded shadow-[0_0_5px_rgba(0,188,212,0.2)] flex items-center justify-center cursor-pointer";
      const numBtn = `${btnClass} text-lg h-10`; 
      const alphaBtn = `${btnClass} h-11`; 

      if (mode === 'r') {
        return (
          <div className="grid grid-cols-4 gap-1 p-0.5 max-w-sm mx-auto w-full">
            {['7','8','9'].map(n => <button key={n} className={numBtn} onClick={() => onPress(n)}>{n}</button>)}
            <button className={`${numBtn} text-red-400 border-red-600`} onClick={onDelete}><Delete size={18} /></button>
            {['4','5','6'].map(n => <button key={n} className={numBtn} onClick={() => onPress(n)}>{n}</button>)}
            <button className={`${numBtn} bg-cyan-900 text-white border-cyan-400`} onClick={onSubmit}><CornerDownLeft size={18} /></button>
            {['1','2','3'].map(n => <button key={n} className={numBtn} onClick={() => onPress(n)}>{n}</button>)}
            <button className={`${numBtn} text-yellow-400 border-yellow-600 text-sm`} onClick={() => onPress('\\sqrt{2}')}>√2</button>
            <button className={`${numBtn} text-yellow-400 border-yellow-600 text-sm`} onClick={() => onPress('\\sqrt{3}')}>√3</button>
            <div className="col-span-3 grid grid-cols-3 gap-1">
               <button className={`${numBtn} col-start-2`} onClick={() => onPress('0')}>0</button>
            </div>
          </div>
        );
      }
      return (
        <div className="grid grid-cols-3 gap-1.5 p-0.5 max-w-sm mx-auto w-full">
          {ALPHA_CHOICES.map(c => (
            <button key={c.label} className={alphaBtn} onClick={() => onPress(c.label)}>
               <MathLabel latex={c.label} className="pointer-events-none scale-75 origin-center" />
            </button>
          ))}
          <button className={`${alphaBtn} text-red-400 border-red-600`} onClick={onDelete}><Delete size={18} /></button>
          <div className="flex items-center justify-center text-gray-600 text-[10px]">SELECT</div>
          <button className={`${alphaBtn} bg-cyan-900 text-white border-cyan-400`} onClick={onSubmit}><CornerDownLeft size={18} /></button>
        </div>
      );
    };

    const App = () => {
      const [gs, setGs] = useState({ phase: GamePhase.START, currentStage: 1, hp: 2, score: 0, timeLeft: 30, totalMistakes: 0, history: [] });
      const [curProb, setCurProb] = useState(null);
      const [inputR, setInputR] = useState(''); const [inputOp, setInputOp] = useState('+'); const [inputAlpha, setInputAlpha] = useState('');
      const [activeFld, setActiveFld] = useState('r');
      const [mState, setMState] = useState('idle'); const [fb, setFb] = useState('none'); const [shake, setShake] = useState(false);
      const timerRef = useRef(null);

      const stopTimer = useCallback(() => { clearInterval(timerRef.current); }, []);

      const nextLvl = useCallback(() => {
        setCurProb(generateProblem()); setInputR(''); setInputOp('+'); setInputAlpha(''); setActiveFld('r'); setFb('none');
        stopTimer(); setGs(p => ({ ...p, timeLeft: 30 }));
        timerRef.current = setInterval(() => {
          setGs(p => {
            if(p.phase !== GamePhase.PLAYING) return p;
            if(p.timeLeft <= 1) { handleWrong(true); return { ...p, timeLeft: 0 }; }
            return { ...p, timeLeft: p.timeLeft - 1 };
          });
        }, 1000);
      }, [stopTimer]);

      const start = useCallback(() => {
        setGs({ phase: GamePhase.PLAYING, currentStage: 1, hp: 2, score: 0, timeLeft: 30, totalMistakes: 0, history: [] });
        setMState('idle'); setFb('none'); nextLvl();
      }, [nextLvl]);

      useEffect(() => { return stopTimer; }, [stopTimer]);
      useEffect(() => { Object.values(ASSETS).forEach(src => { const img = new Image(); img.src = src; }); }, []);
      useEffect(() => { if(gs.hp <= 0 && gs.phase === GamePhase.PLAYING) { stopTimer(); setGs(p => ({ ...p, phase: GamePhase.GAME_OVER })); } }, [gs.hp, gs.phase, stopTimer]);

      const handleWrong = (isTO) => {
        setFb(isTO ? 'timeout' : 'wrong'); setMState('attack'); setShake(true);
        setGs(p => {
            const hist = curProb ? [...p.history, { prob: curProb, uR: inputR||'?', uOp: inputOp, uA: inputAlpha||'?', res: isTO?'timeout':'wrong' }] : p.history;
            return { ...p, totalMistakes: p.totalMistakes + 1, history: hist };
        });
        setTimeout(() => {
          setShake(false); setMState('idle'); setFb('none');
          setGs(p => {
            const h = p.hp - 1; if(h <= 0) { stopTimer(); return { ...p, hp: 0, phase: GamePhase.GAME_OVER }; }
            if(isTO) {
              stopTimer(); timerRef.current = setInterval(() => setGs(prev => prev.timeLeft <= 1 ? (handleWrong(true), { ...prev, timeLeft: 0 }) : { ...prev, timeLeft: prev.timeLeft - 1 }), 1000);
            }
            return { ...p, hp: h, timeLeft: 30 };
          });
        }, 1000);
      };

      const checkAns = () => {
        if(!curProb || gs.phase !== GamePhase.PLAYING || fb !== 'none') return;
        if(evaluateInput(inputR, inputOp, inputAlpha, curProb)) {
          stopTimer(); setFb('correct'); setMState('hit');
          setGs(p => ({ ...p, score: p.score + 100 + (p.timeLeft*10) }));
          setTimeout(() => {
            if(gs.currentStage >= 5) setGs(p => ({ ...p, phase: GamePhase.VICTORY }));
            else { setMState('idle'); setGs(p => ({ ...p, currentStage: p.currentStage + 1 })); nextLvl(); }
          }, 1500);
        } else handleWrong(false);
      };

      const hPress = v => { if(gs.phase===GamePhase.PLAYING){ if(activeFld==='r') setInputR(p=>p+v); else setInputAlpha(v); } };
      const hDel = () => { if(gs.phase===GamePhase.PLAYING){ if(activeFld==='r') setInputR(p=>p.slice(0,-1)); else setInputAlpha(''); } };

      if(gs.phase === GamePhase.START) return (
        <div className="fixed inset-0 h-[100dvh] bg-black text-white flex flex-col items-center justify-center p-4 scanlines">
          <h1 className="text-3xl md:text-6xl text-cyan-400 mb-6 neon-blue font-bold tracking-tighter text-center">TRIG<br/>SYNTH<br/>WARRIOR</h1>
          <div className="bg-gray-900 border-2 border-cyan-600 p-4 md:p-6 rounded-lg max-w-md w-full text-center shadow-[0_0_20px_rgba(0,188,212,0.4)] z-10">
            <p className="mb-4 text-xs text-cyan-200"><span className="text-yellow-400">sin</span> と <span className="text-yellow-400">cos</span> を合成してバグモンスターを撃破せよ</p>
            <div className="text-[10px] text-left mb-6 space-y-2 bg-black p-3 rounded">
               <div className="flex gap-1"><span>1.</span><MathLabel latex="a \sin \theta + b \cos \theta"/><span className="ml-1">を変形</span></div>
               <div className="flex gap-1"><span>2.</span><span className="ml-1">目標:</span><MathLabel latex="r \sin(\theta \pm \alpha)"/></div>
            </div>
            <button onClick={start} className="w-full bg-cyan-700 text-white font-bold py-3 rounded border-b-4 border-cyan-900 flex items-center justify-center gap-2"><Play size={20}/> START</button>
          </div>
        </div>
      );

      if(gs.phase === GamePhase.VICTORY || gs.phase === GamePhase.GAME_OVER) {
        const perf = gs.phase === GamePhase.VICTORY && gs.totalMistakes === 0;
        return (
          <div className="fixed inset-0 h-[100dvh] bg-black flex flex-col items-center p-4 scanlines overflow-y-auto">
            <div className="w-full max-w-2xl flex flex-col items-center z-10 py-4">
              <h1 className={`text-2xl md:text-5xl mb-2 font-black tracking-widest ${gs.phase===GamePhase.VICTORY ? (perf?'text-yellow-400 drop-shadow-[0_0_15px_gold]':'text-green-400 neon-blue'):'text-red-500 neon-red'}`}>
                {gs.phase===GamePhase.VICTORY ? (perf?"PERFECT!!":"CLEAR") : "GAME OVER"}
              </h1>
              <div className="w-48 h-48 mb-6 border-4 bg-gray-900 overflow-hidden shrink-0"><img src={gs.phase===GamePhase.VICTORY?(perf?ASSETS.WIN_PERFECT:ASSETS.WIN_MISS):ASSETS.DEFEAT} className="w-full h-full object-cover"/></div>
              <div className="bg-gray-900 border border-gray-700 p-4 rounded w-full mb-6 text-center">
                <div className="text-gray-400">SCORE: <span className="text-white text-xl">{gs.score}</span></div>
                <div className="text-gray-400">MISTAKES: <span className="text-red-400 text-xl">{gs.totalMistakes}</span></div>
              </div>
              <button onClick={start} className="py-3 px-8 bg-gray-800 text-white rounded border-2 border-cyan-500 font-bold flex gap-2"><RefreshCw size={20}/> RESTART</button>
            </div>
          </div>
        );
      }

      return (
        <div className={`fixed inset-0 h-[100dvh] bg-gray-900 flex flex-col scanlines overflow-hidden ${shake?'animate-[screen_shake_0.5s]':''}`}>
          <div className="h-10 bg-black border-b border-gray-800 flex justify-between items-center px-4 z-20 shrink-0">
            <div className="flex space-x-1">{[...Array(2)].map((_,i)=><Heart key={i} className={`w-6 h-6 ${i<gs.hp?'fill-red-500 text-red-500':'text-gray-800'}`}/>)}</div>
            <div className="text-center font-bold text-cyan-400 text-lg">{gs.timeLeft.toString().padStart(2,'0')}</div>
            <div className="text-right text-yellow-400 text-lg">{gs.score.toString().padStart(5,'0')}</div>
          </div>
          <div className="flex-1 flex flex-col relative w-full max-w-3xl mx-auto overflow-hidden">
            <div className="relative flex-1 bg-gradient-to-b from-gray-900 to-black overflow-hidden p-1">
              <MonsterDisplay state={mState} className="w-full h-full" />
              {fb==='correct' && <div className="absolute inset-0 flex items-center justify-center z-30 pointer-events-none"><div className="text-5xl text-yellow-300 font-bold animate-ping">CRITICAL!</div></div>}
              {(fb==='wrong'||fb==='timeout') && <div className="absolute inset-0 bg-red-500/20 z-30 animate-pulse pointer-events-none"/>}
            </div>
            <div className="bg-black border-t-2 border-cyan-900 p-1 pb-4 z-20 shrink-0">
              <div className="text-center py-1 mb-1 bg-gray-900 rounded border border-gray-700 min-h-[44px] flex items-center justify-center">
                 {curProb && <MathLabel latex={curProb.latex} className="text-lg text-white neon-blue" displayMode={true} />}
              </div>
              <div className="flex justify-center gap-2 mb-1">
                 <div className="flex items-center gap-0.5">
                     <span className="text-gray-400 text-sm"><MathLabel latex="r="/></span>
                     <div onClick={()=>setActiveFld('r')} className={`h-9 w-16 bg-gray-800 border-2 rounded flex items-center justify-center text-lg ${activeFld==='r'?'border-cyan-400 text-white shadow-[0_0_10px_cyan]':'border-gray-600 text-gray-400'}`}>
                        {inputR===''?<span className="animate-pulse text-gray-600">_</span>:<MathLabel latex={inputR}/>}
                     </div>
                 </div>
                 <div className="flex items-center gap-0.5 bg-gray-900/50 p-0.5 rounded border border-gray-800">
                     <span className="text-gray-400 text-sm"><MathLabel latex="\sin(\theta"/></span>
                     <button onClick={()=>gs.phase===GamePhase.PLAYING && setInputOp(p=>p==='+'?'-':'+')} className="h-7 w-10 bg-gray-800 border-2 border-green-400 text-white rounded">
                        {inputOp==='+'?<Plus size={16} className="mx-auto"/>:<Minus size={16} className="mx-auto"/>}
                     </button>
                     <div onClick={()=>setActiveFld('alpha')} className={`h-9 w-16 bg-gray-800 border-2 rounded flex items-center justify-center text-lg ${activeFld==='alpha'?'border-purple-400 text-white shadow-[0_0_10px_purple]':'border-gray-600 text-gray-400'}`}>
                        {inputAlpha===''?<span className="animate-pulse text-gray-600">?</span>:<MathLabel latex={inputAlpha}/>}
                     </div>
                     <span className="text-gray-400 text-sm">)</span>
                 </div>
              </div>
              <Keypad mode={activeFld} onPress={hPress} onDelete={hDel} onSubmit={checkAns} />
            </div>
          </div>
          <style>{`@keyframes screen_shake { 10%, 90% { transform: translate(-1px, 0); } 20%, 80% { transform: translate(2px, 0); } 30%, 50%, 70% { transform: translate(-4px, 0); } 40%, 60% { transform: translate(4px, 0); } }`}</style>
        </div>
      );
    };

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
